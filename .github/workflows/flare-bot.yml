name: Substorm Flare Bot

on:
  # Schedule disabled — flare bot now runs every 2 min on Oracle VPS
  # schedule:
  #   - cron: '0 12 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  flare-bot:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
      - run: pip install -r requirements.txt 2>/dev/null || pip install requests Pillow matplotlib numpy
      - run: python scripts/generate_flare_card.py
        env:
          PYTHONUNBUFFERED: '1'
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TELEGRAM_CHANNEL_ID: ${{ secrets.TELEGRAM_CHANNEL_ID }}
      - run: |
          git config user.name "Flare Bot"
          git config user.email "actions@github.com"
          git add cards/ data/ || true
          git diff --staged --quiet || git commit -m "flare: $(date -u '+%Y-%m-%d %H:%M UTC')"
          git pull --rebase --autostash origin main
          git push
