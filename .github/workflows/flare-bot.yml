name: Substorm Flare Bot

on:
  workflow_dispatch:
  schedule:
    - cron: "*/5 * * * *"
    - cron: "0 0 * * *"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-flarebot-v1
          restore-keys: pip-flarebot-

      - name: Install dependencies
        run: pip install requests pillow matplotlib numpy

      - name: Run flare generator
        run: python scripts/generate_flare_card.py

      - name: Backfill missed flares (daily + manual only)
        if: github.event.schedule == '0 0 * * *' || github.event_name == 'workflow_dispatch'
        run: python scripts/backfill_flares.py

      - name: Commit all generated files
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add cards/ data/processed_flares.json
          git diff --cached --quiet && echo "Nothing to commit" && exit 0
          git pull --rebase origin main
          git commit -m "Update flare cards [$(date -u '+%Y-%m-%d %H:%M UTC')]"
          git push
